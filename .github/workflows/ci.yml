name: CI

on:
  push:
    branches: [main]
  # main 向け PR のみ（GitHub Flow で長命ブランチは main のみ）。
  pull_request:
    branches: [main]

# 同一 PR への連続 push で進行中の旧 run を打ち切り、CI 時間とランナーを節約する。
# ワークフロー名を group に含め、将来ワークフローが増えても ref 衝突しないようにする。
# ただし main への push（連続マージ）では打ち切らない。旧 run を切ると「どのコミットが main を
# 壊したか」の CI 信号が失われるため、main だけは全 run を完走させる（#416）。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# GITHUB_TOKEN を最小権限に絞る。全ジョブ（ci / web / adr / predict-check / shellcheck / db-guards /
# ocr-pdf / docker-build）は checkout とビルド・テストのみで、コミット・コメント・リリース等の書き込みを
# 一切行わないため読取だけで足りる（docker-build も push しない＝レジストリ書込なし）。
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Rust toolchain の単一ソース（#466）。ci.yml 内の toolchain 指定はすべてここを参照する。
  # バージョンを上げるときはここ 1 行と rust-toolchain.toml:channel の 2 箇所を変える。
  RUST_TOOLCHAIN: "1.97.1"

jobs:
  ci:
    runs-on: ubuntu-latest
    # 無言の無限ハング（DB 接続待ち・retry のこじれ等）を防ぐ安全弁。
    timeout-minutes: 30

    # `#[sqlx::test]`（rdb-gateway / api-server / ingest-predictions の統合テスト）が接続する Postgres。
    # ローカル開発（deployments/compose.yaml）と同じ postgres:17-alpine・同じ固定資格情報を使う。
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: paddock
          POSTGRES_PASSWORD: paddock
          POSTGRES_DB: paddock
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U paddock -d paddock"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # `#[sqlx::test]` はこの接続先サーバへ繋ぎ、テストごとに一時 DB を作成・破棄する
      # （paddock ロールは postgres image で superuser のため CREATEDB 可）。マイグレーションは
      # 各テストの `migrations = "deployments/db/migrations"` 属性が一時 DB へ自動適用する。
      DATABASE_URL: postgres://paddock:paddock@localhost:5432/paddock

    steps:
      # third-party / 外部 action はサプライチェーン対策で commit SHA にピンする（コメントは対応タグ）。
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      # rust-toolchain.toml の channel と env.RUST_TOOLCHAIN の一致を確認する（#466）。
      # 不一致ならここで即 fail し、サイレントなバージョン乖離を防ぐ。
      # toml を single source として読み出し、ci.yml の RUST_TOOLCHAIN 変数と比較する。
      - name: Assert rust-toolchain.toml と RUST_TOOLCHAIN の一致 (#466)
        run: |
          toml_channel=$(grep -E '^channel\s*=' rust-toolchain.toml | sed 's/.*= *"\(.*\)"/\1/')
          echo "rust-toolchain.toml channel: ${toml_channel}"
          echo "env.RUST_TOOLCHAIN:           ${RUST_TOOLCHAIN}"
          # channel を読み取れなければ fail-closed（空のまま比較すると理由がメッセージから読めない）。
          if [ -z "${toml_channel}" ]; then
            echo "::error::rust-toolchain.toml から channel を読み取れなかった（ファイル形式の変化？）。#466 参照"
            exit 1
          fi
          if [ "${toml_channel}" != "${RUST_TOOLCHAIN}" ]; then
            echo "::error::rust-toolchain.toml の channel (${toml_channel}) と env.RUST_TOOLCHAIN (${RUST_TOOLCHAIN}) が一致しません。両方を同時に更新してください（#466）"
            exit 1
          fi

      - name: Install Rust toolchain
        # サプライチェーン対策で commit SHA にピン（dtolnay/rust-toolchain は version タグを
        # 切らないため master の 2026-03-27 時点を固定）。
        # toolchain は env.RUST_TOOLCHAIN を参照（単一ソース化 #466）。
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      # 大半のクレートを 1 ステップで実行する。実 Postgres 接続テスト（#[sqlx::test]）は
      # rdb-gateway / api-server / ingest-predictions に散在し単一サーバを共有するため、
      # --test-threads=1 で直列実行する（stock cargo test はテストバイナリ"間"を逐次実行し、
      # --test-threads=1 が各バイナリ"内"も 1 スレッドにするので、両者で全体が直列になる）。
      # 非 DB テストも同じ直列実行に含まれるが
      # （DATABASE_URL は無視される）、スイートは小さく直列でも十分速い。DB クレートを列挙して
      # 分割する方式は、将来別クレートに #[sqlx::test] が増えると取りこぼすため採らない。
      #
      # pdf-ocr / pdf-parser はこのジョブから除外し、専用の `ocr-pdf` ジョブ（mupdf 1.25 の
      # debian:trixie コンテナ）で lib + 統合テストをまとめて実走する。両クレートの統合テスト
      # （test_render / test_parse）は mutool(mupdf) のテキスト/画像抽出に依存し、ubuntu-latest の
      # apt mupdf(1.23) では解析が 0 件になり失敗するため（mupdf >= 1.25 が必要。詳細は ADR0026）。
      - name: Test (Postgres 接続テストを含むため直列実行 / OCR・PDF クレートを除く)
        run: cargo test --locked --workspace --exclude pdf-ocr --exclude pdf-parser -- --test-threads=1

  # web/（React + TypeScript）の検査。Rust の ci ジョブとは独立させて並列で回す（Node/npm しか
  # 要らず Postgres も不要）。tsc 型検査・vitest・openapi.json → schema.d.ts の生成ドリフト検証・
  # Vite ビルドをまとめて実行し、フロントの破壊が main へ素通りするのを防ぐ（#405）。
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Install Node.js
        # 外部 action はサプライチェーン対策で commit SHA にピン（コメントは対応タグ）。
        # Node 22 LTS。Vite 7 の要求下限（20.19 / 22.12）を満たす。
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # ESLint（#413）。react-hooks/exhaustive-deps 等の hooks 検査を CI ゲート化し、
      # 依存配列の退行が人力レビューを素通りするのを防ぐ。--max-warnings 0 は lint スクリプト側で指定。
      - name: Lint (eslint)
        run: npm run lint

      - name: Test (vitest)
        run: npm test

      # docs/api/openapi.json（Rust 側 utoipa が生成する API の正本）から schema.d.ts を再生成し、
      # コミット済みと差分が無いことを確認する。API 変更時に web 型の再生成を忘れるドリフトを検出する。
      - name: Verify generated API types are up to date
        run: |
          npm run gen:api
          git diff --exit-code -- src/api/schema.d.ts

      - name: Build (vite)
        run: npm run build

  # ADR 番号（docs/adr/NNNN-*.md）の重複検出（#254）。並行クローン/worktree 運用で番号が
  # 二重取得される事故（#251 と #253 が同時に 0040 採番）の再発防止。Rust/Postgres 不要の
  # 軽量チェックなので独立ジョブにして並列で即終わらせる（ci / ocr-pdf には影響させない）。
  adr:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Check ADR number duplicates (#254)
        run: bash scripts/check-adr-numbers.sh

  # predict-check の Python テスト（scripts/predict-check/test_*.py）。各ファイルは unittest ではなく
  # `def test_*()` + assert を末尾の main() が集めて実行する「自走式」で、標準ライブラリのみに依存する
  # （numpy/scipy を要する harness 側テストはスコープ外）。ubuntu-latest 同梱の python3 で走らせ、
  # setup-python/pip を挟まない軽量ジョブにする（Rust/Postgres 不要なので独立させ並列で即終わる。#416）。
  predict-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Run predict-check python tests (stdlib のみ・自走式)
        # 各テストは自走式（__main__ で全 test_* を実行し assert 失敗で非 0 終了）なので、
        # unittest discover は 0 件になる。ファイルごとに python3 で実行し 1 本でも落ちたら fail。
        run: |
          for f in scripts/predict-check/test_*.py; do
            echo "== $f"
            python3 "$f"
          done

  # scripts/ のシェルスクリプトを shellcheck で機械検査する（#416）。従来は人力レビューのみで
  # 機械検査ゼロだった。ubuntu-latest 同梱の shellcheck で、拡張子 .sh に加え shebang スクリプト
  # （scripts/mdq / git-hooks/pre-push）も対象にする。--severity=warning の軽量ゲート
  # （info 級の SC2086/2012/2015 は各行で意図をコメント済みのため除外し、warning/error 級の
  # 退行だけを止める）。Rust/Postgres 不要なので独立ジョブで並列に即終わらせる。
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Run shellcheck (--severity=warning)
        # 拡張子で拾えない shebang スクリプトは明示追加。git ls-files で追跡対象のみに絞り、
        # xargs で渡す（$(...) 展開は SC2046 の word-splitting 警告になるため避ける）。
        run: |
          git ls-files '*.sh' scripts/mdq scripts/git-hooks/pre-push \
            | xargs -r shellcheck --severity=warning

  # reset-db.sh / seed-db.sh の golden DB 保護ガードの回帰テスト（scripts/test-db-guards.sh・#406/#465）。
  # ガードが退行すると「golden DB を DROP しうる」最悪級の事故に直結するため、テストが存在するのに
  # CI で回っていない状態を解消する。テスト本体は到達不能ポート :1 を使い実 DB を一切触らないので
  # Postgres サービスは不要。ただし対象スクリプトは golden ガード判定の手前で `command -v psql` を
  # 確認し、psql が無いとガード到達前に exit する（BLOCK ケースがガードメッセージに届かず落ちる）。
  # ubuntu-latest には psql 同梱だが、ランナーイメージのドリフトで欠けても即座に気づけるよう
  # postgresql-client を明示導入する。Rust/Postgres サーバ不要なので独立ジョブで並列に即終わる。
  db-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Install psql client (golden ガード手前の command -v psql を満たす)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Run golden DB guard regression test (#406/#465)
        run: bash scripts/test-db-guards.sh

  # pdf-ocr / pdf-parser の統合テスト（test_render / test_parse）は mutool(mupdf) のテキスト/画像
  # 抽出に依存し、mupdf >= 1.25 が必要（ubuntu-latest の apt mupdf は 1.23 でサンプル解析が 0 件に
  # なり失敗する。検証結果・方針は ADR0026）。mupdf 1.25 を apt で得られる debian:trixie コンテナで
  # 専用に実走する。これらのクレートは DB を触らないため Postgres サービスは付けない。
  # tesseract OCR を使う test_extract は決定論性が低いため #[ignore] のままにする（CI 標準では走らない）。
  ocr-pdf:
    runs-on: ubuntu-latest
    container: debian:trixie-slim
    timeout-minutes: 30
    steps:
      # コンテナには git / 証明書 / ビルドツール / mupdf / tesseract が無いので先に入れる。
      #   - mupdf-tools: trixie の apt で 1.25 系（パーサが要求する下限を満たす）
      #   - build-essential: rustls(ring) の C/asm ビルド用（ureq は rustls=純 Rust TLS のため
      #     OpenSSL 非依存。pdf-ocr/pdf-parser の閉包に sqlx(native-tls) は入らず libssl-dev は不要）
      #   - git: actions/checkout の clone 用 / curl + ca-certificates: dtolnay/rust-toolchain が
      #     bare コンテナで rustup を自己ブートストラップ（sh.rustup.rs 取得）するのに必須
      - name: Install system deps (mupdf 1.25 / tesseract-jpn / build toolchain)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            mupdf-tools tesseract-ocr tesseract-ocr-jpn \
            build-essential git curl ca-certificates

      # mupdf の版ドリフト（trixie のポイント/安定版更新で 1.25 未満に戻る等）で統合テストが
      # サイレントに 0 レース化するのを防ぐ。パーサが要求する下限 1.25 を満たさなければ明示的に fail。
      - name: Assert mupdf >= 1.25 (parser floor; see ADR0026)
        run: |
          ver=$(mutool -v 2>&1 | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "mupdf version: $ver"
          # 出力フォーマット変化等で版を取れなければ fail-closed（空のまま比較すると誤 PASS する）。
          if [ -z "$ver" ]; then
            echo "::error::mutool のバージョンを判定できなかった（出力形式の変化？）。ADR0026 参照"
            exit 1
          fi
          major=${ver%%.*}; minor=${ver#*.}; minor=${minor%%.*}
          if [ "$major" -lt 1 ] || { [ "$major" -eq 1 ] && [ "$minor" -lt 25 ]; }; then
            echo "::error::mupdf $ver < 1.25; pdf-parser はサンプルを 0 レースに割る。ADR0026 参照（コンテナ版を上げる）"
            exit 1
          fi

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Install Rust toolchain
        # 本体 ci ジョブと同じ SHA ピン（dtolnay/rust-toolchain は version タグを切らないため
        # master の 2026-03-27 時点を固定）。
        # toolchain は env.RUST_TOOLCHAIN を参照（単一ソース化 #466）。
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # lib（OCR 非依存ユニット）+ 統合（test_render の PNG 化 / test_parse の解析値）をまとめて実走。
      # サンプル PDF は JRA 著作物で repo に含めない（gitignore）。フィクスチャが JRA から取得を試み、
      # 取得できれば統合テストが走り、取得不可なら graceful skip（ユニットは PDF 不要で常時走る。
      # JRA 不通日は統合テストがアサーション未実行で緑になるトレードオフ。詳細は ADR0026）。
      # `--test-threads=1`: 複数テストバイナリの並行 JRA 取得を避け、出力を決定的にするため直列化する。
      - name: Test pdf-ocr / pdf-parser (mupdf-backed 統合テストを含む)
        run: cargo test --locked -p pdf-ocr -p pdf-parser -- --test-threads=1

  # deployments/ の Dockerfile 3 本（api / web / importer）の builder ステージが CI で検証されておらず、
  # デプロイ（compose up --build）時に初めて壊れる問題への早期検知ゲート（#467）。builder ステージの
  # apt 依存や COPY パスがソース変更・ベースイメージ更新でロットしても、ここで止める。
  #
  # 設計判断:
  #   - `--target builder` 止め: runtime ステージまで作らず「ソースが image 内で compile / npm build できるか」
  #     だけを見る。builder が壊れる主因（apt 依存欠落・COPY パスずれ・cargo/npm ビルド失敗）はここで全て
  #     捕捉でき、フルビルドの重い runtime レイヤ（不変な apt install 等）を省ける。
  #   - GHA キャッシュ（cache-from/to=gha）で cargo/npm レイヤと buildx のマウントを run 間で使い回し、
  #     2 回目以降を軽くする。push/load はしない（レジストリにも Docker daemon にも成果物を残さない）。
  #   - matrix で 3 本を並列。1 本の破壊が他をマスクしないよう fail-fast=false。
  #   - トリガ: この job は必須チェック（ci/web/adr/predict-check/shellcheck/ocr-pdf）に含めない（#461 ruleset
  #     には追加しない）。GitHub の "必須 + paths 未マッチ" は status 未報告で PR を無限ブロックするため、
  #     必須化と paths ゲートは両立しない。代わりに changes ジョブで関連パスの変更有無を判定し、無関係な
  #     PR（docs のみ等）では build 本体を skip する（ランナー節約）。非必須なので skip でも PR は通る。
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # dockerfile: 検証対象の Dockerfile。すべて builder ステージ止めでビルドする。
        # build context はリポジトリルート（.）＝compose.yaml の api/web/importer と同じ context: ..。
        dockerfile:
          - deployments/api.Dockerfile
          - deployments/web.Dockerfile
          - deployments/importer.Dockerfile
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      # 関連ファイルが変わった PR でだけ重いビルドを回す（無関係 PR ではランナーを使わない）。
      # dorny/paths-filter 等の外部 action を足さず、git diff で in-house 判定する。
      #   - PR: base（origin/<base>）との 3-dot diff で変更ファイルを列挙。
      #   - push（main）: 直前コミットとの diff。取れなければ（初回コミット等）安全側で「変更あり」にする。
      # 判定対象: 全 Dockerfile / compose.yaml / web.nginx.conf / importer-entrypoint.sh / Rust ソース
      # （src/・Cargo.toml・Cargo.lock・rust-toolchain.toml）/ web/ / 本 workflow 自身。
      - name: Detect relevant changes
        id: changes
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${BASE_REF}"
            # PR は base との 3-dot diff（マージベース以降の変更）。単一引数。
            range=("origin/${BASE_REF}...HEAD")
          else
            # push イベント。親コミットとの 2-dot diff（引数 2 個）。親が無い（初回）等で
            # diff が取れなければ後段で fail-open。配列で持って word-split 事故を避ける。
            range=("HEAD^" "HEAD")
          fi
          if ! files=$(git diff --name-only "${range[@]}" 2>/dev/null); then
            echo "diff を取得できなかったため fail-open（ビルドする）"
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "変更ファイル:"; echo "${files}"
          # 関連パスに 1 つでも該当すれば run=true。egrep パターンに合わせて grep -E で判定する。
          if echo "${files}" | grep -Eq \
            '^(deployments/|src/|web/|Cargo\.toml$|Cargo\.lock$|rust-toolchain\.toml$|\.github/workflows/ci\.yml$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "関連パスの変更なし → docker builder ビルドを skip"
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      # 外部 action はサプライチェーン対策で commit SHA にピン（コメントは対応タグ）。
      - name: Set up Docker Buildx
        if: steps.changes.outputs.run == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # builder ステージまでビルド（runtime は作らない）。push/load せず、成否だけを見る。
      # GHA キャッシュで cargo/npm レイヤを run 間で再利用する。scope を Dockerfile ごとに分け、
      # 3 本のキャッシュが互いを上書きしないようにする。
      - name: Build builder stage (${{ matrix.dockerfile }})
        if: steps.changes.outputs.run == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: builder
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.dockerfile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}
