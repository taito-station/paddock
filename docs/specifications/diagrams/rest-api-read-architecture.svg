<svg xmlns="http://www.w3.org/2000/svg" width="960" height="780" viewBox="0 0 960 780" font-family="sans-serif" font-size="13">
  <!-- REST API (read) レイヤー構成 -->

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- 凡例 -->
  <rect x="10" y="8" width="12" height="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1"/>
  <text x="25" y="19" font-size="11" fill="#333">Apps（新規）</text>
  <rect x="120" y="8" width="12" height="12" fill="#e1d5e7" stroke="#9673a6" stroke-width="1"/>
  <text x="135" y="19" font-size="11" fill="#333">Interface</text>
  <rect x="210" y="8" width="12" height="12" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="225" y="19" font-size="11" fill="#333">Use-Case / Domain（既存）</text>
  <rect x="400" y="8" width="12" height="12" fill="#fff2cc" stroke="#d6b656" stroke-width="1"/>
  <text x="415" y="19" font-size="11" fill="#333">OpenAPI（utoipa）</text>
  <text x="560" y="19" font-size="11" fill="#777">実線=依存方向（Apps→Interface→Use-Case→Domain）</text>

  <!-- Client -->
  <rect x="40" y="45" width="180" height="56" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="130" y="68" text-anchor="middle" font-weight="bold" fill="#333">Client / SPA (#34)</text>
  <text x="130" y="86" text-anchor="middle" font-size="11" fill="#444">HTTP (JSON)</text>

  <!-- Swagger UI / openapi.json -->
  <rect x="740" y="45" width="200" height="56" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="840" y="66" text-anchor="middle" font-weight="bold" fill="#333">Swagger UI: /docs</text>
  <text x="840" y="84" text-anchor="middle" font-size="11" fill="#444">/api-docs/openapi.json</text>

  <!-- apps/api-server -->
  <rect x="40" y="130" width="900" height="92" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="60" y="152" font-weight="bold" fill="#333">apps/api-server（新規・常駐バイナリ）</text>
  <rect x="60" y="162" width="190" height="48" rx="6" fill="#fff" stroke="#6c8ebf" stroke-width="1"/>
  <text x="155" y="182" text-anchor="middle" font-size="11" fill="#333">bin.rs（エントリ）</text>
  <text x="155" y="198" text-anchor="middle" font-size="11" fill="#333">setup.rs（DI 構築）</text>
  <rect x="270" y="162" width="190" height="48" rx="6" fill="#fff" stroke="#6c8ebf" stroke-width="1"/>
  <text x="365" y="182" text-anchor="middle" font-size="11" fill="#333">app.rs（route 設定）</text>
  <text x="365" y="198" text-anchor="middle" font-size="11" fill="#333">tracing / config</text>
  <rect x="480" y="162" width="200" height="48" rx="6" fill="#fff" stroke="#6c8ebf" stroke-width="1"/>
  <text x="580" y="182" text-anchor="middle" font-size="11" fill="#333">認証ミドルウェア</text>
  <text x="580" y="198" text-anchor="middle" font-size="11" fill="#333">差し込み口（no-op）</text>
  <rect x="700" y="162" width="220" height="48" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1"/>
  <text x="810" y="182" text-anchor="middle" font-size="11" fill="#333">ApiDoc（utoipa）マウント</text>
  <text x="810" y="198" text-anchor="middle" font-size="11" fill="#333">/docs ・ openapi.json</text>

  <!-- interface/rest-controller -->
  <rect x="40" y="252" width="900" height="100" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="60" y="274" font-weight="bold" fill="#333">interface/rest-controller（新規）</text>
  <rect x="60" y="284" width="200" height="56" rx="6" fill="#fff" stroke="#9673a6" stroke-width="1"/>
  <text x="160" y="304" text-anchor="middle" font-size="11" fill="#333">handler/{race,analyze}</text>
  <text x="160" y="320" text-anchor="middle" font-size="11" fill="#333">Interactor を呼ぶだけ</text>
  <text x="160" y="334" text-anchor="middle" font-size="10" fill="#666">#[utoipa::path]</text>
  <rect x="280" y="284" width="190" height="56" rx="6" fill="#fff" stroke="#9673a6" stroke-width="1"/>
  <text x="375" y="304" text-anchor="middle" font-size="11" fill="#333">router/{race,analyze}</text>
  <text x="375" y="320" text-anchor="middle" font-size="11" fill="#333">configure&lt;R,P,F&gt;</text>
  <rect x="490" y="284" width="200" height="56" rx="6" fill="#fff" stroke="#9673a6" stroke-width="1"/>
  <text x="590" y="304" text-anchor="middle" font-size="11" fill="#333">schema/{entity}/...</text>
  <text x="590" y="320" text-anchor="middle" font-size="11" fill="#333">request/response</text>
  <text x="590" y="334" text-anchor="middle" font-size="10" fill="#666">#[derive(ToSchema)]</text>
  <rect x="710" y="284" width="210" height="56" rx="6" fill="#fff" stroke="#9673a6" stroke-width="1"/>
  <text x="815" y="304" text-anchor="middle" font-size="11" fill="#333">error/mod.rs</text>
  <text x="815" y="320" text-anchor="middle" font-size="11" fill="#333">ResponseError 実装</text>
  <text x="815" y="334" text-anchor="middle" font-size="10" fill="#666">use_case::Error → HTTP</text>

  <!-- use-case -->
  <rect x="40" y="382" width="620" height="92" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="60" y="404" font-weight="bold" fill="#333">use-case（既存・再利用）Interactor&lt;R, P, F&gt;</text>
  <text x="60" y="426" font-size="11" fill="#444">races_by_date(date) → Vec&lt;Race&gt;</text>
  <text x="60" y="443" font-size="11" fill="#444">race_card(race_id) → Option&lt;RaceCard&gt;（新規）</text>
  <text x="60" y="460" font-size="11" fill="#444">predict_race(race_id, …) → Vec&lt;HorseProbability&gt;</text>
  <text x="360" y="426" font-size="11" fill="#444">horse_stats / course_stats</text>
  <text x="360" y="443" font-size="11" fill="#444">jockey_stats / trainer_stats</text>
  <text x="360" y="460" font-size="10" fill="#666">as_of=None（全期間集計）</text>

  <!-- interface/rdb-gateway -->
  <rect x="680" y="382" width="260" height="92" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="700" y="404" font-weight="bold" fill="#333">interface/rdb-gateway（既存）</text>
  <text x="700" y="426" font-size="11" fill="#444">Repository 実装</text>
  <text x="700" y="443" font-size="11" fill="#444">SQLite（PADDOCK_DB_URL）</text>
  <text x="700" y="460" font-size="10" fill="#666">read メソッドのみ使用</text>

  <!-- domain -->
  <rect x="40" y="504" width="900" height="64" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="60" y="526" font-weight="bold" fill="#333">domain（既存）</text>
  <text x="60" y="548" font-size="11" fill="#444">Race / RaceCard / HorseEntry / HorseProbability / GroupStat・*StatsRow / RaceId / Venue / Surface …</text>
  <text x="60" y="562" font-size="10" fill="#666">外部依存なし。API スキーマは domain を schema/ で DTO 化して公開する</text>

  <!-- endpoints box -->
  <rect x="40" y="600" width="900" height="150" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="60" y="622" font-weight="bold" fill="#333">read エンドポイント（#33 スコープ・prefix /api）</text>
  <text x="60" y="646" font-size="12" fill="#333">GET /api/races?date=YYYY-MM-DD            → レース一覧</text>
  <text x="60" y="668" font-size="12" fill="#333">GET /api/races/{race_id}                  → 出馬表（race card）</text>
  <text x="60" y="690" font-size="12" fill="#333">GET /api/races/{race_id}/prediction       → 確率推定（win/place/show）</text>
  <text x="60" y="712" font-size="12" fill="#333">GET /api/analyze/{kind}                    → 分析統計（kind: horse / course / jockey / trainer）</text>
  <text x="60" y="734" font-size="11" fill="#777">スコープ外: 買い目推奨(#51 依存) / セッション write(#53) / オッズ・結果の refresh(#51/#40)</text>

  <!-- arrows -->
  <line x1="130" y1="101" x2="130" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="840" y1="101" x2="840" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="222" x2="490" y2="252" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="242" font-size="10" fill="#777">依存</text>
  <line x1="350" y1="352" x2="350" y2="382" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="760" y1="352" x2="780" y2="382" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="474" x2="480" y2="504" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="810" y1="474" x2="700" y2="504" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
