<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1700" viewBox="0 0 960 1700" font-family="sans-serif" font-size="13">
  <!-- predict 対話セッションフロー -->

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- 凡例 -->
  <rect x="10" y="8" width="12" height="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1"/>
  <text x="25" y="19" font-size="11" fill="#333">ユーザー入力/表示</text>
  <rect x="145" y="8" width="12" height="12" fill="#e1d5e7" stroke="#9673a6" stroke-width="1"/>
  <text x="160" y="19" font-size="11" fill="#333">処理/DB</text>
  <rect x="220" y="8" width="12" height="12" fill="#fff2cc" stroke="#d6b656" stroke-width="1"/>
  <text x="235" y="19" font-size="11" fill="#333">判定</text>
  <rect x="275" y="8" width="12" height="12" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="290" y="19" font-size="11" fill="#333">正常系</text>
  <rect x="340" y="8" width="12" height="12" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
  <text x="355" y="19" font-size="11" fill="#333">スキップ/エラー</text>

  <!-- START -->
  <rect x="330" y="38" width="300" height="45" rx="22" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="480" y="58" text-anchor="middle" font-weight="bold" fill="#333">START</text>
  <text x="480" y="74" text-anchor="middle" font-size="11" fill="#555">predict --date D --budget B</text>

  <!-- Arrow: START → fetch races -->
  <line x1="480" y1="83" x2="480" y2="110" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- find_races_by_date -->
  <rect x="290" y="110" width="380" height="48" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="480" y="131" text-anchor="middle" font-weight="bold" fill="#333">find_races_by_date(D)</text>
  <text x="480" y="149" text-anchor="middle" font-size="11" fill="#444">→ races: Vec&lt;Race&gt;（race_num 昇順）</text>

  <!-- Arrow: fetch → diamond -->
  <line x1="480" y1="158" x2="480" y2="185" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diamond: races.is_empty? -->
  <polygon points="480,185 620,232 480,279 340,232" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="480" y="227" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">races.is_empty()？</text>

  <!-- YES → no-races box (right) -->
  <line x1="620" y1="232" x2="720" y2="232" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="666" y="224" text-anchor="middle" font-size="11" fill="#b85450">YES</text>
  <rect x="720" y="210" width="200" height="45" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="820" y="228" text-anchor="middle" font-size="11" fill="#333">「この日の開催はありません」</text>
  <text x="820" y="245" text-anchor="middle" font-size="11" fill="#333">を表示して終了</text>

  <!-- NO → loop start -->
  <line x1="480" y1="279" x2="480" y2="308" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="490" y="300" font-size="11" fill="#2a7a2a">NO</text>

  <!-- ===== LOOP START ===== -->
  <!-- 次のレースを取り出す -->
  <rect x="295" y="308" width="370" height="42" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="480" y="325" text-anchor="middle" font-weight="bold" fill="#333">次のレースを取り出す</text>
  <text x="480" y="341" text-anchor="middle" font-size="11" fill="#444">race: Race（race_num 昇順）</text>

  <!-- Arrow: next → header -->
  <line x1="480" y1="350" x2="480" y2="377" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- レースヘッダ表示 -->
  <rect x="295" y="377" width="370" height="42" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="480" y="395" text-anchor="middle" font-weight="bold" fill="#333">レースヘッダ表示</text>
  <text x="480" y="411" text-anchor="middle" font-size="11" fill="#444">「レースN: 場所 距離 / 残高: ¥B」</text>

  <!-- Arrow: header → parallel -->
  <line x1="480" y1="419" x2="480" y2="440" stroke="#333" stroke-width="1.5"/>
  <line x1="480" y1="440" x2="220" y2="440" stroke="#333" stroke-width="1.5"/>
  <line x1="480" y1="440" x2="740" y2="440" stroke="#333" stroke-width="1.5"/>
  <line x1="220" y1="440" x2="220" y2="457" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="740" y1="440" x2="740" y2="457" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- predict_race (left) -->
  <rect x="80" y="457" width="280" height="48" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="220" y="477" text-anchor="middle" font-weight="bold" fill="#333">predict_race(race_id)</text>
  <text x="220" y="495" text-anchor="middle" font-size="11" fill="#444">→ Vec&lt;HorseProbability&gt;</text>

  <!-- find_race_odds (right) -->
  <rect x="600" y="457" width="280" height="48" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="740" y="477" text-anchor="middle" font-weight="bold" fill="#333">find_race_odds(race_id)</text>
  <text x="740" y="495" text-anchor="middle" font-size="11" fill="#444">→ Option&lt;RaceOdds&gt;</text>

  <!-- Arrows: both → prob table -->
  <line x1="220" y1="505" x2="220" y2="520" stroke="#333" stroke-width="1.5"/>
  <line x1="740" y1="505" x2="740" y2="520" stroke="#333" stroke-width="1.5"/>
  <line x1="220" y1="520" x2="480" y2="520" stroke="#333" stroke-width="1.5"/>
  <line x1="740" y1="520" x2="480" y2="520" stroke="#333" stroke-width="1.5"/>
  <line x1="480" y1="520" x2="480" y2="537" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 確率テーブル表示 -->
  <rect x="270" y="537" width="420" height="48" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="480" y="558" text-anchor="middle" font-weight="bold" fill="#333">確率テーブル表示</text>
  <text x="480" y="576" text-anchor="middle" font-size="11" fill="#444">馬番・馬名・勝率・連対率・複勝率</text>

  <!-- Arrow: prob → odds diamond -->
  <line x1="480" y1="585" x2="480" y2="612" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diamond: odds is Some? -->
  <polygon points="480,612 620,659 480,706 340,659" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="480" y="654" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">RaceOdds は</text>
  <text x="480" y="671" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Some？</text>

  <!-- None → warning (right) -->
  <line x1="620" y1="659" x2="720" y2="659" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="666" y="651" text-anchor="middle" font-size="11" fill="#b85450">None</text>
  <rect x="720" y="637" width="210" height="45" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="825" y="656" text-anchor="middle" font-size="11" fill="#333">「オッズ未取得</text>
  <text x="825" y="673" text-anchor="middle" font-size="11" fill="#333">→ スキップ推奨」</text>

  <!-- Some → select_bets -->
  <line x1="480" y1="706" x2="480" y2="735" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="490" y="727" font-size="11" fill="#2a7a2a">Some</text>
  <!-- None also flows to select_bets (with empty odds) -->
  <line x1="825" y1="682" x2="825" y2="750" stroke="#333" stroke-width="1.5"/>
  <line x1="825" y1="750" x2="640" y2="750" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- select_bets -->
  <rect x="220" y="735" width="420" height="48" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="430" y="756" text-anchor="middle" font-weight="bold" fill="#333">select_bets(probs, odds, BettingConfig::default())</text>
  <text x="430" y="774" text-anchor="middle" font-size="11" fill="#444">→ Vec&lt;BettingRecommendation&gt;</text>

  <!-- Arrow: select_bets → display recs -->
  <line x1="430" y1="783" x2="430" y2="810" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 買い目推奨を表示 -->
  <rect x="220" y="810" width="420" height="48" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="430" y="831" text-anchor="middle" font-weight="bold" fill="#333">買い目推奨を表示</text>
  <text x="430" y="849" text-anchor="middle" font-size="11" fill="#444">推奨なし → 「EV閾値を超える買い目なし」</text>

  <!-- Arrow: display → user choice -->
  <line x1="430" y1="858" x2="430" y2="885" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diamond: [y/e/s] -->
  <polygon points="430,885 595,935 430,985 265,935" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="430" y="928" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">[y] 推奨通り</text>
  <text x="430" y="946" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">[e] 編集 / [s] スキップ</text>

  <!-- y → 確定 (left) -->
  <line x1="265" y1="935" x2="165" y2="935" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="212" y="926" text-anchor="middle" font-size="11" fill="#2a7a2a">y</text>
  <rect x="30" y="913" width="135" height="45" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="97" y="932" text-anchor="middle" font-size="11" fill="#333">推奨額を確定</text>
  <text x="97" y="949" text-anchor="middle" font-size="11" fill="#444">budget -= bet</text>

  <!-- s → スキップ (right) -->
  <line x1="595" y1="935" x2="695" y2="935" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="643" y="926" text-anchor="middle" font-size="11" fill="#b85450">s</text>
  <rect x="695" y="913" width="135" height="45" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="762" y="932" text-anchor="middle" font-size="11" fill="#333">スキップ</text>
  <text x="762" y="949" text-anchor="middle" font-size="11" fill="#444">bet = ¥0</text>

  <!-- e → 金額編集 (center-down) -->
  <line x1="430" y1="985" x2="430" y2="1010" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="440" y="1003" font-size="11" fill="#333">e</text>
  <rect x="270" y="1010" width="320" height="48" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="430" y="1031" text-anchor="middle" font-weight="bold" fill="#333">各買い目の金額を対話入力</text>
  <text x="430" y="1049" text-anchor="middle" font-size="11" fill="#444">budget -= 合計入力額</text>

  <!-- merge: y, s, e → payout -->
  <line x1="97" y1="958" x2="97" y2="1075" stroke="#333" stroke-width="1.5"/>
  <line x1="762" y1="958" x2="762" y2="1075" stroke="#333" stroke-width="1.5"/>
  <line x1="430" y1="1058" x2="430" y2="1075" stroke="#333" stroke-width="1.5"/>
  <line x1="97" y1="1075" x2="430" y2="1075" stroke="#333" stroke-width="1.5"/>
  <line x1="762" y1="1075" x2="430" y2="1075" stroke="#333" stroke-width="1.5"/>
  <line x1="430" y1="1075" x2="430" y2="1090" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- payout入力 -->
  <rect x="230" y="1090" width="400" height="52" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="430" y="1112" text-anchor="middle" font-weight="bold" fill="#333">レース後: 実際の払い戻し額を入力</text>
  <text x="430" y="1130" text-anchor="middle" font-size="11" fill="#444">（Enter のみ → payout = ¥0）</text>

  <!-- Arrow: payout → budget update -->
  <line x1="430" y1="1142" x2="430" y2="1169" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- budget更新 -->
  <rect x="260" y="1169" width="340" height="48" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="430" y="1190" text-anchor="middle" font-weight="bold" fill="#333">残高更新・損益表示</text>
  <text x="430" y="1208" text-anchor="middle" font-size="11" fill="#444">budget += payout / 損益 = payout − bet</text>

  <!-- Arrow: budget → next race? -->
  <line x1="430" y1="1217" x2="430" y2="1244" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diamond: 次レースあり? -->
  <polygon points="430,1244 580,1291 430,1338 280,1291" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="430" y="1284" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">次のレース</text>
  <text x="430" y="1301" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">あり？</text>

  <!-- YES → loop back (left) -->
  <line x1="280" y1="1291" x2="90" y2="1291" stroke="#333" stroke-width="1.5"/>
  <text x="183" y="1283" text-anchor="middle" font-size="11" fill="#2a7a2a">YES</text>
  <line x1="90" y1="1291" x2="90" y2="329" stroke="#333" stroke-width="1.5"/>
  <line x1="90" y1="329" x2="295" y2="329" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- NO → 集計 -->
  <line x1="430" y1="1338" x2="430" y2="1365" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="440" y="1358" font-size="11" fill="#b85450">NO</text>

  <!-- 一日集計表示 -->
  <rect x="220" y="1365" width="420" height="52" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="430" y="1386" text-anchor="middle" font-weight="bold" fill="#333">一日集計を表示</text>
  <text x="430" y="1404" text-anchor="middle" font-size="11" fill="#444">総賭け金 / 総払戻 / 最終残高 / P&amp;L</text>

  <!-- Arrow: 集計 → END -->
  <line x1="430" y1="1417" x2="430" y2="1444" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- END -->
  <rect x="340" y="1444" width="180" height="42" rx="21" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="430" y="1470" text-anchor="middle" font-weight="bold" fill="#333">END</text>

  <!-- no-races path to END -->
  <line x1="820" y1="255" x2="820" y2="1465" stroke="#b85450" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="820" y1="1465" x2="520" y2="1465" stroke="#b85450" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
</svg>
