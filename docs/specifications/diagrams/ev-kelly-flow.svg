<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1020" viewBox="0 0 900 1020" font-family="sans-serif" font-size="13">
  <!-- 期待値・Kelly配分フロー -->

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- 凡例 -->
  <rect x="10" y="8" width="12" height="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1"/>
  <text x="25" y="19" font-size="11" fill="#333">入力</text>
  <rect x="65" y="8" width="12" height="12" fill="#e1d5e7" stroke="#9673a6" stroke-width="1"/>
  <text x="80" y="19" font-size="11" fill="#333">処理</text>
  <rect x="120" y="8" width="12" height="12" fill="#fff2cc" stroke="#d6b656" stroke-width="1"/>
  <text x="135" y="19" font-size="11" fill="#333">判定</text>
  <rect x="175" y="8" width="12" height="12" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="190" y="19" font-size="11" fill="#333">出力/正常系</text>
  <rect x="265" y="8" width="12" height="12" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
  <text x="280" y="19" font-size="11" fill="#333">除外</text>

  <!-- START -->
  <rect x="370" y="30" width="160" height="40" rx="20" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="450" y="55" text-anchor="middle" font-weight="bold" fill="#333">START</text>

  <!-- Arrow: START → 入力 -->
  <line x1="450" y1="70" x2="450" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 入力 -->
  <rect x="230" y="100" width="440" height="60" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="450" y="122" text-anchor="middle" font-weight="bold" fill="#333">入力</text>
  <text x="450" y="139" text-anchor="middle" font-size="11" fill="#444">HorseProbability[] / RaceOdds / BettingConfig</text>
  <text x="450" y="153" text-anchor="middle" font-size="10" fill="#666">(ev_threshold=1.0, trifecta_ev_threshold=2.0, kelly_cap=0.25)</text>

  <!-- Arrow: 入力 → 候補生成 -->
  <line x1="450" y1="160" x2="450" y2="195" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 候補生成ラベル -->
  <rect x="330" y="195" width="240" height="40" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="450" y="210" text-anchor="middle" font-weight="bold" fill="#333">各馬券種の候補生成</text>
  <text x="450" y="227" text-anchor="middle" font-size="11" fill="#444">全組み合わせを列挙</text>

  <!-- Arrows: 候補生成 → 各馬券種 -->
  <line x1="330" y1="215" x2="160" y2="275" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="235" x2="380" y2="275" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="235" x2="570" y2="275" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 単勝・複勝 -->
  <rect x="60" y="275" width="200" height="55" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="160" y="295" text-anchor="middle" font-weight="bold" font-size="12" fill="#333">単勝・複勝</text>
  <text x="160" y="311" text-anchor="middle" font-size="11" fill="#444">P = win_prob</text>
  <text x="160" y="325" text-anchor="middle" font-size="11" fill="#444">P = show_prob</text>

  <!-- 馬連・馬単 -->
  <rect x="300" y="275" width="200" height="55" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="400" y="295" text-anchor="middle" font-weight="bold" font-size="12" fill="#333">馬連・馬単</text>
  <text x="400" y="311" text-anchor="middle" font-size="11" fill="#444">P = Harville 2頭式</text>
  <text x="400" y="325" text-anchor="middle" font-size="11" fill="#444">全ペア O(n²)</text>

  <!-- 三連複・三連単 -->
  <rect x="540" y="275" width="220" height="55" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="650" y="295" text-anchor="middle" font-weight="bold" font-size="12" fill="#333">三連複・三連単</text>
  <text x="650" y="311" text-anchor="middle" font-size="11" fill="#444">P = Harville 3頭式</text>
  <text x="650" y="325" text-anchor="middle" font-size="11" fill="#444">全トリプル O(n³)</text>

  <!-- Arrows: 各馬券種 → EV計算 -->
  <line x1="160" y1="330" x2="350" y2="398" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="330" x2="420" y2="398" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="330" x2="540" y2="398" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- EV計算 -->
  <rect x="290" y="398" width="320" height="55" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="450" y="420" text-anchor="middle" font-weight="bold" fill="#333">EV 計算</text>
  <text x="450" y="437" text-anchor="middle" font-size="11" fill="#444">ev = probability × odds</text>
  <text x="450" y="450" text-anchor="middle" font-size="10" fill="#666">(複勝は low/high の中央値を使用)</text>

  <!-- Arrow: EV計算 → 判定 -->
  <line x1="450" y1="453" x2="450" y2="490" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- EV閾値判定 (diamond) -->
  <polygon points="450,490 580,540 450,590 320,540" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="450" y="530" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">EV &gt; 閾値？</text>
  <text x="450" y="547" text-anchor="middle" font-size="10" fill="#666">三連単: trifecta_ev_threshold</text>
  <text x="450" y="561" text-anchor="middle" font-size="10" fill="#666">その他: ev_threshold</text>

  <!-- NO → 除外 -->
  <line x1="580" y1="540" x2="680" y2="540" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="623" y="530" text-anchor="middle" font-size="11" fill="#b85450">NO</text>
  <rect x="680" y="515" width="110" height="45" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="735" y="542" text-anchor="middle" font-size="12" fill="#c00">除外</text>

  <!-- YES → Kelly計算 -->
  <line x1="450" y1="590" x2="450" y2="628" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="615" font-size="11" fill="#2a7a2a">YES</text>

  <!-- Kelly計算 -->
  <rect x="260" y="628" width="380" height="80" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="450" y="648" text-anchor="middle" font-weight="bold" fill="#333">Kelly 計算</text>
  <text x="450" y="665" text-anchor="middle" font-size="11" fill="#444">b = odds − 1, q = 1 − p</text>
  <text x="450" y="681" text-anchor="middle" font-size="11" fill="#444">f = (p × b − q) / b</text>
  <text x="450" y="697" text-anchor="middle" font-size="11" fill="#444">kelly_fraction = clamp(f, 0.0, kelly_cap)</text>

  <!-- Arrow: Kelly → ソート -->
  <line x1="450" y1="708" x2="450" y2="748" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 優先度ソート -->
  <rect x="240" y="748" width="420" height="65" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="450" y="768" text-anchor="middle" font-weight="bold" fill="#333">優先度ソート</text>
  <text x="450" y="785" text-anchor="middle" font-size="11" fill="#444">馬連 &gt; 馬単 &gt; 三連複 &gt; 単勝 &gt; 複勝 &gt; 三連単</text>
  <text x="450" y="802" text-anchor="middle" font-size="10" fill="#666">同一馬券種内は EV 降順 / 三連単は常に最後尾（優先度 5）</text>

  <!-- Arrow: ソート → 出力 -->
  <line x1="450" y1="813" x2="450" y2="853" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 出力 -->
  <rect x="240" y="853" width="420" height="60" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="450" y="875" text-anchor="middle" font-weight="bold" fill="#333">Vec&lt;BettingRecommendation&gt; を出力</text>
  <text x="450" y="893" text-anchor="middle" font-size="11" fill="#444">combination / probability / odds / ev / kelly_fraction</text>

  <!-- Harville 補足ボックス -->
  <rect x="20" y="500" width="300" height="110" rx="8" fill="#fff9e6" stroke="#d6b656" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="30" y="518" font-size="11" font-weight="bold" fill="#555">Harville 公式（参考）</text>
  <text x="30" y="535" font-size="10" fill="#666">馬連(a,b): win[a]·win[b]/(1-win[a]) + win[b]·win[a]/(1-win[b])</text>
  <text x="30" y="550" font-size="10" fill="#666">馬単(a→b): win[a]·win[b]/(1-win[a])</text>
  <text x="30" y="565" font-size="10" fill="#666">三連単(a→b→c):</text>
  <text x="40" y="580" font-size="10" fill="#666">win[a] · win[b]/(1-win[a]) · win[c]/(1-win[a]-win[b])</text>
  <text x="30" y="598" font-size="10" fill="#666">三連複{a,b,c}: Σ P(i→j→k) over all 6 permutations</text>
</svg>
