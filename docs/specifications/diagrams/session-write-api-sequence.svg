<svg xmlns="http://www.w3.org/2000/svg" width="940" height="600" viewBox="0 0 940 600" font-family="sans-serif" font-size="12">
  <!-- POST /sessions/{date}/races/{race_id}/outcome のシーケンス -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>

  <text x="20" y="24" font-weight="bold" fill="#333">POST /sessions/{date}/races/{race_id}/outcome（賭け金・払戻の記録）</text>

  <!-- lifelines -->
  <g font-size="12" font-weight="bold" fill="#333" text-anchor="middle">
    <rect x="40"  y="40" width="130" height="38" rx="6" fill="#dae8fc" stroke="#6c8ebf"/><text x="105" y="64">Client / SPA</text>
    <rect x="250" y="40" width="150" height="38" rx="6" fill="#e1d5e7" stroke="#9673a6"/><text x="325" y="64">handler (rest-controller)</text>
    <rect x="480" y="40" width="150" height="38" rx="6" fill="#d5e8d4" stroke="#82b366"/><text x="555" y="64">Interactor (use-case)</text>
    <rect x="710" y="40" width="190" height="38" rx="6" fill="#e1d5e7" stroke="#9673a6"/><text x="805" y="64">Repository (Postgres)</text>
  </g>
  <g stroke="#999" stroke-dasharray="3,3">
    <line x1="105" y1="78" x2="105" y2="560"/>
    <line x1="325" y1="78" x2="325" y2="560"/>
    <line x1="555" y1="78" x2="555" y2="560"/>
    <line x1="805" y1="78" x2="805" y2="560"/>
  </g>

  <!-- 1: request -->
  <line x1="105" y1="105" x2="325" y2="105" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="115" y="99" font-size="11" fill="#333">POST outcome { bets:[{bet_type,combination,stake,payout,ev}] }</text>

  <!-- 2: validate + parse -->
  <line x1="325" y1="140" x2="555" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="335" y="134" font-size="11" fill="#333">record_race_outcome(date, race_id, bets)</text>
  <text x="335" y="156" font-size="10" fill="#666">スキーマ検証・RaceId 変換（失敗は 400）</text>

  <!-- 3: load session -->
  <line x1="555" y1="185" x2="805" y2="185" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="565" y="179" font-size="11" fill="#333">find_predict_session(date)</text>
  <line x1="805" y1="210" x2="555" y2="210" stroke="#333" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="565" y="204" font-size="10" fill="#666">PredictSessionRecord（None なら 404）</text>

  <!-- 4: guard -->
  <rect x="455" y="230" width="200" height="60" rx="6" fill="#fff2cc" stroke="#d6b656"/>
  <text x="555" y="250" text-anchor="middle" font-size="11" fill="#333">残高ガード</text>
  <text x="555" y="267" text-anchor="middle" font-size="10" fill="#444">Σstake ≤ balance を検証</text>
  <text x="555" y="281" text-anchor="middle" font-size="10" fill="#b85450">超過なら 400（状態不変）</text>

  <!-- 5: compute -->
  <rect x="455" y="300" width="200" height="56" rx="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="555" y="320" text-anchor="middle" font-size="11" fill="#333">残高・累計を計算</text>
  <text x="555" y="336" text-anchor="middle" font-size="10" fill="#444">balance −= Σstake; balance += Σpayout</text>
  <text x="555" y="350" text-anchor="middle" font-size="10" fill="#444">total_bet += Σstake; total_payout += Σpayout</text>

  <!-- 6: save in 1 tx -->
  <line x1="555" y1="385" x2="805" y2="385" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="565" y="379" font-size="11" fill="#333">save_race_outcome(session, race_id, bets)</text>
  <rect x="700" y="400" width="210" height="56" rx="6" fill="#f8cecc" stroke="#b85450"/>
  <text x="805" y="420" text-anchor="middle" font-size="11" fill="#333">1 トランザクション</text>
  <text x="805" y="436" text-anchor="middle" font-size="10" fill="#444">セッションヘッダ upsert</text>
  <text x="805" y="450" text-anchor="middle" font-size="10" fill="#444">+ 当該レースの bets 追記</text>
  <line x1="805" y1="470" x2="555" y2="470" stroke="#333" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="565" y="464" font-size="10" fill="#666">commit（失敗は 500・ロールバック）</text>

  <!-- 7: response -->
  <line x1="555" y1="505" x2="325" y2="505" stroke="#333" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="335" y="499" font-size="10" fill="#666">更新後セッション収支</text>
  <line x1="325" y1="535" x2="105" y2="535" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="115" y="529" font-size="11" fill="#333">200 { balance, total_bet, total_payout, pnl }</text>
</svg>
