<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1280" viewBox="0 0 1000 1280" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#333333"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1000" height="1280" fill="#ffffff"/>

  <!-- edges (drawn first, under nodes) -->
  <g stroke="#333333" stroke-width="1.5" fill="none">
    <line x1="370" y1="80" x2="370" y2="118" marker-end="url(#arrow)"/>
    <line x1="370" y1="180" x2="370" y2="218" marker-end="url(#arrow)"/>
    <line x1="370" y1="288" x2="370" y2="326" marker-end="url(#arrow)"/>
    <line x1="370" y1="404" x2="370" y2="448" marker-end="url(#arrow)"/>
    <line x1="370" y1="538" x2="370" y2="586" marker-end="url(#arrow)"/>
    <line x1="370" y1="664" x2="370" y2="708" marker-end="url(#arrow)"/>
    <line x1="370" y1="798" x2="370" y2="846" marker-end="url(#arrow)"/>
    <line x1="370" y1="936" x2="370" y2="984" marker-end="url(#arrow)"/>
    <!-- diamond4 YES -> skip (right) -->
    <path d="M540,360 L700,360" marker-end="url(#arrow)"/>
    <!-- skip dashed back to fetch -->
    <path d="M790,392 L790,478 L540,478" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
    <!-- diamond7 YES -> missing (right) -->
    <path d="M540,730 L700,730" marker-end="url(#arrow)"/>
    <!-- missing dashed back to save_race_card -->
    <path d="M790,762 L790,876 L540,876" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  </g>

  <!-- edge labels -->
  <g font-size="11" fill="#333333">
    <text x="378" y="438">NO（未取得 or --force）</text>
    <text x="600" y="354">YES</text>
    <text x="378" y="700">NO</text>
    <text x="600" y="724">YES</text>
  </g>

  <!-- 1. START -->
  <g>
    <rect x="280" y="40" width="180" height="40" rx="8" fill="#f5f5f5" stroke="#666666"/>
    <text x="370" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">START</text>
    <text x="370" y="73" text-anchor="middle" font-size="11" fill="#333333">paddock-fetch-card</text>
  </g>

  <!-- 2. 入力 (blue) -->
  <g>
    <rect x="250" y="118" width="240" height="62" rx="8" fill="#dae8fc" stroke="#6c8ebf"/>
    <text x="370" y="138" text-anchor="middle" font-size="11" font-weight="bold">入力</text>
    <text x="370" y="155" text-anchor="middle" font-size="11">netkeiba race_id（12桁）を直接指定</text>
    <text x="370" y="171" text-anchor="middle" font-size="11">or 構成要素（年/場/回/日/R）を指定</text>
  </g>

  <!-- 3. race_id 構築 (purple) -->
  <g>
    <rect x="230" y="218" width="280" height="62" rx="8" fill="#e1d5e7" stroke="#9673a6"/>
    <text x="370" y="238" text-anchor="middle" font-size="11">race_id 構築ヘルパ</text>
    <text x="370" y="255" text-anchor="middle" font-size="11">YYYY + 場2 + 回2 + 日2 + R2</text>
    <text x="370" y="271" text-anchor="middle" font-size="11">→ netkeiba 12桁 / paddock RaceId 導出</text>
  </g>

  <!-- 4. diamond 出馬表取得済み? (yellow) -->
  <g>
    <polygon points="370,316 540,360 370,404 200,360" fill="#fff2cc" stroke="#d6b656"/>
    <text x="370" y="356" text-anchor="middle" font-size="11">出馬表は取得済み？</text>
    <text x="370" y="372" text-anchor="middle" font-size="11">fetch_history_contains</text>
  </g>

  <!-- skip 出馬表 (grey, right) -->
  <g>
    <rect x="700" y="330" width="220" height="60" rx="8" fill="#f5f5f5" stroke="#666666"/>
    <text x="810" y="356" text-anchor="middle" font-size="11" fill="#333333">出馬表の保存をスキップ</text>
    <text x="810" y="372" text-anchor="middle" font-size="11" fill="#333333">（オッズ取得・更新は継続）</text>
  </g>

  <!-- 5. netkeiba fetch (purple) -->
  <g>
    <rect x="220" y="448" width="300" height="62" rx="8" fill="#e1d5e7" stroke="#9673a6"/>
    <text x="370" y="468" text-anchor="middle" font-size="11">NetkeibaScraper::fetch_card</text>
    <text x="370" y="485" text-anchor="middle" font-size="11">race/shutuba.html を GET（ureq）</text>
    <text x="370" y="501" text-anchor="middle" font-size="11">EUC-JP → UTF-8 デコード</text>
  </g>

  <!-- 6. parse (purple) -->
  <g>
    <rect x="210" y="586" width="320" height="78" rx="8" fill="#e1d5e7" stroke="#9673a6"/>
    <text x="370" y="606" text-anchor="middle" font-size="11">shutuba HTML を parse</text>
    <text x="370" y="622" text-anchor="middle" font-size="11">RaceCard / HorseEntry（枠/馬番/馬名/騎手）</text>
    <text x="370" y="638" text-anchor="middle" font-size="11">＋ 単勝オッズ・人気（馬番ごと）</text>
    <text x="370" y="654" text-anchor="middle" font-size="11">斤量・性齢は取得するが #28 では破棄</text>
  </g>

  <!-- 7. diamond オッズ未確定? (yellow) -->
  <g>
    <polygon points="370,686 540,730 370,774 200,730" fill="#fff2cc" stroke="#d6b656"/>
    <text x="370" y="726" text-anchor="middle" font-size="11">単勝オッズ未確定？</text>
    <text x="370" y="742" text-anchor="middle" font-size="11">（レース前で空欄）</text>
  </g>

  <!-- missing odds (red, right) -->
  <g>
    <rect x="700" y="698" width="220" height="64" rx="8" fill="#f8cecc" stroke="#b85450"/>
    <text x="810" y="720" text-anchor="middle" font-size="11">オッズは空のまま</text>
    <text x="810" y="736" text-anchor="middle" font-size="11">（win マップを populate しない）</text>
    <text x="810" y="752" text-anchor="middle" font-size="11">出馬表保存は継続</text>
  </g>

  <!-- 8. save_race_card (green) -->
  <g>
    <rect x="210" y="846" width="320" height="70" rx="8" fill="#d5e8d4" stroke="#82b366"/>
    <text x="370" y="868" text-anchor="middle" font-size="11" font-weight="bold">Repository::save_race_card</text>
    <text x="370" y="885" text-anchor="middle" font-size="11">race_cards UPSERT / horse_entries 入替</text>
    <text x="370" y="901" text-anchor="middle" font-size="11">fetch_history に出馬表取得を記録</text>
  </g>

  <!-- 9. save_race_odds (green) -->
  <g>
    <rect x="210" y="984" width="320" height="88" rx="8" fill="#d5e8d4" stroke="#82b366"/>
    <text x="370" y="1006" text-anchor="middle" font-size="11" font-weight="bold">Repository::save_race_odds</text>
    <text x="370" y="1023" text-anchor="middle" font-size="11">race_odds に win 行を upsert</text>
    <text x="370" y="1039" text-anchor="middle" font-size="11">bet_type=win / key=馬番 / odds / popularity</text>
    <text x="370" y="1055" text-anchor="middle" font-size="11">★ 変動するため常に最新で上書き</text>
  </g>

  <!-- 10. SQLite cylinder (green) -->
  <g>
    <path d="M270,1140 a100,14 0 0,0 200,0 v-26 a100,14 0 0,0 -200,0 v26 z" fill="#d5e8d4" stroke="#82b366"/>
    <ellipse cx="370" cy="1114" rx="100" ry="14" fill="#d5e8d4" stroke="#82b366"/>
    <text x="370" y="1130" text-anchor="middle" font-size="11">SQLite</text>
    <text x="370" y="1146" text-anchor="middle" font-size="10">race_cards / horse_entries</text>
    <text x="370" y="1160" text-anchor="middle" font-size="10">race_odds / fetch_history</text>
  </g>
  <line x1="370" y1="1072" x2="370" y2="1098" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
