# ローカル/開発用の compose スタック（DB / REST API / 取り込み importer）。
#
#   docker compose -f deployments/compose.yaml up -d postgres api   # DB + API を起動
#
# DB バックエンドは Postgres。各 worktree はこの 1 サーバを共有し、worktree ごとに別 database 名で
# 分離する（PADDOCK_DB_URL の DB 名を変える。seed/reset は scripts/ を使う）。Postgres のデータは
# named volume（paddock-pgdata）で永続化する（macOS の bind-mount はロックが不安定なため使わない）。
services:
  postgres:
    image: postgres:17-alpine
    container_name: paddock-postgres
    # 開発専用の固定資格情報（本番流用禁止）。
    environment:
      POSTGRES_USER: paddock
      POSTGRES_PASSWORD: paddock
      POSTGRES_DB: paddock
    # ローカル限定で公開（LAN へ晒さない）。
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - paddock-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paddock -d paddock"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # REST API（api-server, #33）の常駐サービス（#35）。postgres 健全化後に起動し、
  # マイグレーションは API 自身が起動時に適用する（pool::migrate）。
  api:
    build:
      context: ..
      dockerfile: deployments/api.Dockerfile
    image: paddock-api
    container_name: paddock-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # 開発専用の固定資格情報（本番流用禁止）。同一 compose ネットワークの postgres へ接続。
      PADDOCK_DB_URL: postgres://paddock:paddock@postgres:5432/paddock
      # コンテナ外の公開ポートから到達するため全 IF で bind する（既定 127.0.0.1 はコンテナ内のみ）。
      PADDOCK_SERVER_ADDR: 0.0.0.0:8080
      PADDOCK_LOG: info
    # ローカル限定で公開（LAN へ晒さない。postgres と同方針）。
    ports:
      - "127.0.0.1:8080:8080"
    # 起動 readiness を依存ツール無しで確認する。runtime に curl/wget は入れていないため bash の
    # /dev/tcp で 8080 への TCP 到達のみを検査し、接続後すぐ fd を閉じる。bind は pool::migrate の後に
    # 実行されるため、listening は起動時マイグレーション完了を含意する（HTTP レベルの health は見ない）。
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 && exec 3>&-"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # 成績取り込みを dev から隔離実行する importer（#146）。run-and-forget で使う:
  #   docker compose -f deployments/compose.yaml build importer
  #   docker compose -f deployments/compose.yaml run --rm -d importer fetch --year 2025
  # fetch は entrypoint が礼節ペーシング（-j 1 --interval 3 --max-rps 0.3）を既定で補う。
  # 取り込み状態は DB の fetch_history に記録され、中断後の再実行は冪等（取得済みはスキップ）。
  importer:
    build:
      context: ..
      dockerfile: deployments/importer.Dockerfile
    image: paddock-importer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # 開発専用の固定資格情報（本番流用禁止）。同一 compose ネットワークの postgres へ接続（bind mount 不要）。
      PADDOCK_DB_URL: postgres://paddock:paddock@postgres:5432/paddock
      PADDOCK_LOG: info
    # CPU 使用量を制限し、取り込み中もホストの dev を軽く保つ。docker compose v2 は
    # deploy.resources.limits.cpus を honor する（run/up とも NanoCpus に反映。検証済み）。
    # 明示したい場合は `docker compose run --cpus 2 importer ...` でも上書きできる。
    deploy:
      resources:
        limits:
          cpus: "2.0"
    restart: "no"

volumes:
  paddock-pgdata:
