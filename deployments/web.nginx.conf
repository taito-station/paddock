# SPA 配信 + /api リバプロ。SPA なので未知パスは index.html へフォールバック
# （クライアントルーティング）。/api は compose ネットワークの api サービスへ転送し、
# ブラウザからは同一オリジンに見せる（CORS 不要）。
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # 基本的なセキュリティヘッダ（127.0.0.1 限定公開だが将来公開時に効く）。
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ハッシュ付きビルド資産は長期キャッシュ可（内容が変われば名前も変わる）。
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html はキャッシュさせない（新デプロイを確実に取りに行かせる）。
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
