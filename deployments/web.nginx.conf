# SPA 配信 + /api リバプロ。SPA なので未知パスは index.html へフォールバック
# （クライアントルーティング）。/api は compose ネットワークの api サービスへ転送し、
# ブラウザからは同一オリジンに見せる（CORS 不要）。
#
# 注意: nginx の add_header は「その階層に add_header が1つでもあると上位を継承しない
# （置換）」仕様。location ごとに Cache-Control を出し分ける都合上、セキュリティヘッダは
# 各 location で都度再掲する（server レベルだけに置くと location で消える）。
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    # nginx:1.27-alpine の mime.types は .js→application/javascript だが、将来 text/javascript
    # にマップが変わっても JS が無圧縮にならないよう両方を列挙しておく（text/html は常に対象）。
    gzip_types text/css application/javascript text/javascript application/json image/svg+xml;

    location /api/ {
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ハッシュ付きビルド資産は長期キャッシュ可（内容が変われば名前も変わる）。
    location /assets/ {
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Cache-Control "public, immutable";
        expires 1y;
    }

    # index.html はキャッシュさせない（新デプロイを確実に取りに行かせる）。
    location / {
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
